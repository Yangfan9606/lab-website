# =============================================================
#  Sveltia CMS configuration
#  Purpose: defines what the visual admin (/admin) can edit and
#           which form fields each collection exposes.
#  Note: the CMS only writes fields it knows about, so every field
#        below MUST match the frontmatter already used by the
#        template's .md files, otherwise data gets stripped on save.
# =============================================================

# ---------- Backend: which GitHub repo content is stored in ----------
backend:
  name: github
  repo: YOUR-USERNAME/YOUR-REPO   # ★MUST CHANGE: set to "username/repo"; update again after transfer to the lab account
  branch: main                    # edits save to main; GitHub Actions builds and publishes to gh-pages
  # base_url: https://YOUR-AUTH-WORKER.workers.dev   # ★OAuth relay (see "CMS-Guide.md" section 3)

# ---------- Image upload location ----------
# The template references images as images/xxx.jpg, so both point at images/
media_folder: images        # uploaded images are stored in the repo's images/ folder
public_folder: images       # path prefix written into files (= the template's existing style)

# Admin UI language
locale: en

# =============================================================
#  Collections
#  Only "Members" and "News" are exposed - both are pure content
#  and never touch layout. Page bodies, background image,
#  publications and the lab name contain layout includes or are
#  low-frequency, so they are intentionally left out of the admin
#  to prevent accidental layout breakage (edit them by hand).
# =============================================================
collections:

  # ========== 1) Members -> _members/*.md ==========
  - name: members
    label: Members
    label_singular: Member
    folder: _members
    create: true                  # allow creating new entries
    slug: '{{fields.name | lower | replace(" ", "-")}}'   # filename from name, e.g. jane-smith.md
    summary: '{{fields.name}} - {{fields.role}}'           # text shown per row in the list
    sort:
      - { field: name, direction: ascending }
    fields:
      - { name: name, label: Name, widget: string }
      - { name: image, label: Photo, widget: image, required: false, default: images/photo.jpg }
      - name: role
        label: Role
        widget: select
        hint: The team page groups people by role; ask the admin to add options here if you need a new role
        options:
          - { label: 'PI (Principal Investigator)', value: principal-investigator }
          - { label: 'Postdoc',                     value: postdoc }
          - { label: 'PhD Student',                 value: phd }
          - { label: 'Masters Student',             value: masters }
          - { label: 'Undergraduate',               value: undergrad }
          - { label: 'Research Assistant / Programmer', value: programmer }
          - { label: 'Alumni',                      value: alumni }
      - { name: affiliation, label: Affiliation, widget: string, required: false }
      # aliases kept: existing member files have it, must be configured or it gets deleted on save
      - { name: aliases, label: 'Name aliases (for auto-matching paper authors, optional)', widget: list, required: false }
      - name: links
        label: Links
        widget: object
        required: false
        fields:
          - { name: email,          label: Email,           widget: string, required: false }
          - { name: home-page,      label: Home page,       widget: string, required: false }
          - { name: orcid,          label: ORCID,           widget: string, required: false }
          - { name: google-scholar, label: 'Google Scholar', widget: string, required: false }
          - { name: github,         label: GitHub,          widget: string, required: false }
          - { name: twitter,        label: 'Twitter / X',   widget: string, required: false }
      - { name: body, label: Bio, widget: markdown, required: false }

  # ========== 2) News -> _posts/*.md ==========
  - name: news
    label: News
    label_singular: Post
    folder: _posts
    create: true
    # Jekyll requires filenames like 2026-06-18-title.md; generated from date + title below
    slug: '{{year}}-{{month}}-{{day}}-{{slug}}'
    summary: '{{fields.date}} - {{fields.title}}'
    sort:
      - { field: date, direction: descending }
    fields:
      - { name: title, label: Title, widget: string }
      - { name: date,  label: Date, widget: datetime, format: 'YYYY-MM-DD', date_format: 'YYYY-MM-DD', time_format: false }
      - name: author
        label: Author
        widget: relation            # dropdown of existing members, no typing
        collection: members
        search_fields: [name]
        value_field: '{{slug}}'     # stores the member filename (e.g. jane-smith)
        display_fields: [name]
        required: false
      - { name: tags, label: Tags, widget: list, required: false }
      - { name: body, label: Body, widget: markdown }
